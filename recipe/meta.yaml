{% set name = "xcube-sh" %}
{% set version = "0.11.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/xcube-dev/xcube-sh/archive/v{{ version }}.tar.gz
  sha256: 177dd2def4fe3e5cb0dbf9b90def11acab0dc834b6238305497f5acebc6f6fa7

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - click
    - numcodecs
    - numpy
    - oauthlib >=3.0
    - pandas
    - psutil
    - pyproj
    - requests
    - requests-oauthlib >=1.3
    - xarray
    - xcube >=0.10
    - zarr

test:
  requires:
    - python {{ python_min }}
  imports:
    - xcube_sh

about:
  summary: xcube plugin for the Sentinel Hub Cloud API
  home: https://github.com/xcube-dev/xcube-sh
  license: MIT
  license_family: MIT
  license_file: LICENSE
  description: xcube-sh is an xcube plugin that allows generating data cubes from the Sentinel Hub Cloud API.
  doc_url: https://github.com/xcube-dev/xcube-sh/blob/main/README.md
  dev_url: https://github.com/xcube-dev/xcube-sh

extra:
  recipe-maintainers:
    - clarasb
    - AliceBalfanz
    - b-yogesh
    - forman
    - konstntokas
    - pont-us
    - TejasMorbagal
    - thomasstorm
    - TonioF
